<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Archibald Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LEFT COLUMN NAV -->
<div class="left-column">

  <!-- Instagram -->
  <a href="https://www.instagram.com/YOUR_USERNAME" target="_blank" class="instagram-link">
    <svg viewBox="0 0 24 24" class="instagram-icon">
      <rect x="2" y="2" width="20" height="20" rx="5" fill="none" stroke="black" stroke-width="2"/>
      <circle cx="12" cy="12" r="5" fill="none" stroke="black" stroke-width="2"/>
      <circle cx="17" cy="7" r="1" fill="black"/>
    </svg>
  </a>

  <!-- YEARS + PROJECTS -->
  <div class="year-nav">

    <div class="year-block">
      <div class="year">2026</div>
      <div class="projects">
        <button class="project-link" data-project="movement-matters">Movement Matters</button>
        <button class="project-link" data-project="max-speed-3">Max Speed 3</button>
        <button class="project-link" data-project="handbook-tactical">Handbook Tactical</button>
        <button class="project-link" data-project="156-billionaires">156 billionaires</button>
        <button class="project-link" data-project="tactical-test">Tactical Test</button>
        <button class="project-link" data-project="iiewywt-question">IIEWYWT?</button>
        <button class="project-link" data-project="iiewywt-exclaim">IIEWYWT!</button>
      </div>
    </div>

    <div class="year">2025</div>
    <div class="year">2024</div>
    <div class="year">2023</div>
    <div class="year">2022</div>
    <div class="year">2021</div>
    <div class="year">2020</div>
    <div class="year">2019</div>

  </div>
</div>

<!-- TOP RIGHT HOME BUTTON -->
<a href="#" class="home-button" id="home-button">ABYW</a>

<!-- MAIN CONTENT AREA -->
<main class="landing-content" id="main-content">
  <h1>Hi I'm Archibald</h1>
  <p>Welcome to my portfolio</p>
</main>

<script>
  const projectData = {
    "movement-matters": "<h1>Movement Matters</h1><p>Project description here.</p>",
    "max-speed-3": "<h1>Max Speed 3</h1><p>Project description here.</p>",
    "handbook-tactical": "<h1>Handbook Tactical</h1><p>Project description here.</p>",
    "156-billionaires": "<h1>156 Billionaires</h1><p>Project description here.</p>",
    "tactical-test": "<h1>Tactical Test</h1><p>Project description here.</p>",
    "iiewywt-question": "<h1>IIEWYWT?</h1><p>Project description here.</p>",
    "iiewywt-exclaim": "<h1>IIEWYWT!</h1><p>Project description here.</p>"
  };

  const projectLinks = document.querySelectorAll('.project-link');
  const mainContent = document.getElementById('main-content');
  const homeButton = document.getElementById('home-button');

  projectLinks.forEach(link => {
    link.addEventListener('click', () => {
      const project = link.getAttribute('data-project');
      mainContent.innerHTML = projectData[project] || "<p>Project not found</p>";
      // Scroll right content to top without moving left column
      mainContent.scrollTop = 0;
    });
  });

  homeButton.addEventListener('click', (e) => {
    e.preventDefault();
    mainContent.innerHTML = "<h1>Hi I'm Archibald</h1><p>Welcome to my portfolio</p>";
    mainContent.scrollTop = 0;
  });
</script>

</body>
</html>
